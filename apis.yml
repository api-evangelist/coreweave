  - type: Reference
    url: https://docs.coreweave.com/products/inference/reference/capacityclaimservice/create-capacity-claim
- aid: coreweave:vpc-api
  name: CoreWeave VPC API
  description: The VPC API creates and manages Virtual Private Clouds on CoreWeave, including network configuration,
    routing, and isolation for CKS clusters and other compute resources.
  humanURL: https://docs.coreweave.com/products/networking/vpc/vpc-api
