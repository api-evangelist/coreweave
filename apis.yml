aid: coreweave
name: CoreWeave
description: CoreWeave is a specialized GPU cloud purpose-built for AI workloads, offering managed Kubernetes
  (CKS), Slurm-on-Kubernetes (SUNK), dedicated and serverless inference, AI Object Storage, distributed VAST
  file storage, HPC InfiniBand interconnect, and a Sandbox product. CoreWeave's control plane is Kubernetes-native
  and exposes APIs for CKS clusters, Inference deployments and gateways, VPCs, Object Storage, and Sandbox
  control.
