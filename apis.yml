apis:
- aid: coreweave:cks-api
  name: CoreWeave Kubernetes Service API
  description: The CKS API provisions and manages CoreWeave Kubernetes Service clusters and node pools on
    bare-metal GPU and CPU hardware. It exposes operations for cluster lifecycle, node pool configuration,
    and hardware-aware scheduling for training, inference, and HPC workloads.
  humanURL: https://docs.coreweave.com/products/cks/reference/cks-api
  tags:
  - Bare Metal
  - Clusters
  - GPU
  - Kubernetes
  - Node Pools
  properties:
  - type: Documentation
    url: https://docs.coreweave.com/products/cks/reference/cks-api
  - type: Reference
    url: https://docs.coreweave.com/products/cks/reference/node-pool
- aid: coreweave:inference-api
  name: CoreWeave Inference API
  description: The CoreWeave Inference API manages Deployments, Gateways, and Capacity Claims for serverless
    and dedicated AI inference. It is used to create, update, and route to managed model deployments backed
    by CoreWeave's GPU fleet.
  humanURL: https://docs.coreweave.com/products/inference/reference/api-overview
  tags:
  - AI
  - Deployments
  - Gateways
  - Inference
  - Models
  properties:
  - type: Documentation
    url: https://docs.coreweave.com/products/inference/reference/api-overview
  - type: Reference
    url: https://docs.coreweave.com/products/inference/reference/deploymentservice/create-deployment
  - type: Reference
