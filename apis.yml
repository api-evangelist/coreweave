  - type: Reference
    url: https://docs.coreweave.com/products/networking/vpc/vpc-api/vpcservice/create-vpc
- aid: coreweave:object-storage-api
  name: CoreWeave AI Object Storage API
  description: CoreWeave AI Object Storage (CAIOS) is an S3-compatible object storage service optimized for
    AI dataset and model storage. It supports standard S3 operations alongside CoreWeave-specific bucket
    and access controls.
  humanURL: https://docs.coreweave.com/products/storage/object-storage/reference/object-storage-api-ref
